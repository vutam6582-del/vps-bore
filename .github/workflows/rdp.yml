name: RDP by DucThang x TrueHieu (V7 - Chốt Hạ Tuyệt Đối)

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL for logs'
        required: false
      machine_id:
        description: 'Machine ID for logs'
        required: false
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: vps-bore-runner
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 1440

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup Logging Helper
        shell: pwsh
        run: |
          $code = @'
          param([string]$message)
          Write-Host "[SYSTEM LOG]: $message"
          $serverUrl = "${{ github.event.inputs.server_url }}"
          $machineId = "${{ github.event.inputs.machine_id }}"
          if ($serverUrl -and $machineId) {
            try {
              $body = @{ machineId = $machineId; message = $message } | ConvertTo-Json -Compress
              Invoke-RestMethod -Uri "$serverUrl/api/machine-log" -Method Post -Body $body -ContentType "application/json" -TimeoutSec 10 | Out-Null
            } catch {
              Write-Host "Failed to report log to server: $_"
            }
          }
          '@
          $code | Out-File -FilePath "report-log.ps1" -Encoding UTF8

      - name: Download and Extract Bore
        shell: pwsh
        run: |
          .\report-log.ps1 "📥 Đang tải và giải nén Bore..."
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath bore
          .\report-log.ps1 "✅ Đã tải Bore."

      - name: Enable RDP + Create Admin User
        shell: pwsh
        run: |
          .\report-log.ps1 "👤 Cấu hình tài khoản Admin & RDP..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $pass = ConvertTo-SecureString "WindowsRDP2026@" -AsPlainText -Force
          New-LocalUser "admin" -Password $pass -FullName "admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "admin"
          Add-LocalGroupMember -Group "Administrators" -Member "admin"
          .\report-log.ps1 "✅ Tạo tài khoản admin thành công (Pass: WindowsRDP2026@)."

      - name: Tối ưu Registry 4K
        shell: pwsh
        run: |
          .\report-log.ps1 "🚀 Đang cấu hình Registry tối ưu RDP 4K/120FPS..."
          $tsPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services"
          if (!(Test-Path $tsPath)) { New-Item -Path $tsPath -Force }
          Set-ItemProperty -Path $tsPath -Name "fEnableVirtualizedGraphics" -Value 1 -Type DWord
          Set-ItemProperty -Path $tsPath -Name "MinFrameRate" -Value 120 -Type DWord
          .\report-log.ps1 "✅ Registry optimized."

      - name: Monitor Bore Stream & Force Update File
        shell: pwsh
        run: |
          .\report-log.ps1 "🌐 Khởi chạy Bore stream..."
          $PASS = "WindowsRDP2026@"
          $USER = "admin"
          $lastFullAddress = ""

          # Cấu hình Git ép buộc
          git config --global user.name "TrueHieu-Bot"
          git config --global user.email "bot@trueteam.top"
          git config --global core.autocrlf false

          .\report-log.ps1 "🔍 Đang kết nối Bore Server..."

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = ".\bore\bore.exe"
          $psi.Arguments = "local 3389 --to bore.pub"
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $process = [System.Diagnostics.Process]::Start($psi)

          while (!$process.HasExited) {
              $line = $process.StandardOutput.ReadLine()
              if ($line) { Write-Host "[bore] $line" }
              if ($line -match "(?:listening at|remote forwarding at) (bore\.pub:\d+)") {
                  $fullAddress = $matches[1]
                  $portOnly = $fullAddress.Split(':')[1]

                  if ($fullAddress -ne $lastFullAddress) {
                      $lastFullAddress = $fullAddress
                      .\report-log.ps1 "✅ Mở port RDP thành công trên Bore: $fullAddress"
                      
                      if (Test-Path "rdp_info.txt") { Remove-Item "rdp_info.txt" -Force }

                      $createdAt = (Get-Date).ToString('HH:mm:ss dd/MM/yyyy')
                      $reportLines = @(
                        '=======================================================',
                        'RDP INFO - DucThang x TrueHieu Edition',
                        '=======================================================',
                        "FULL ADDRESS   : $fullAddress",
                        "PORT           : $portOnly",
                        'HOST           : bore.pub',
                        '-------------------------------------------------------',
                        "Username       : $USER",
                        "Password       : $PASS",
                        "Created        : $createdAt",
                        '======================================================='
                      )
                      $report = ($reportLines -join "`r`n")
                      [System.IO.File]::WriteAllText("$(Get-Location)\rdp_info.txt", $report)
                      
                      git checkout main
                      git add rdp_info.txt
                      git commit -m "Update RDP: $portOnly [skip ci]"
                      git push origin main --force
                      
                      .\report-log.ps1 "✅ Đã commit thông tin RDP lên repo: $fullAddress"
                  }
              }
              Start-Sleep -Milliseconds 200
          }
